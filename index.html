<body>

<main class="page">

<!-- Intro window in page -->
<section class="window">

<!-- Music window in page -->
<section class="window window--playlist">

<header class="window-header">
        <h2>top tracks</h2>

      </header>

      <div class="playlist">
        <ol class="tracklist">

          <div class="player-placeholder">
            Player area (put Spotify/SoundCloud iframe here)
          </div>
        </div>
      </div>

</section>
<!-- End of music window -->

</main>

}
<!-- JSS music player logic -->
<script>
  document.querySelectorAll(".tracklist a").forEach(a => {
    a.addEventListener("click", (e) => {
      e.preventDefault();
      document.querySelector(".player-placeholder").textContent =
        "Selected: " + a.textContent + " (swap in embed here)";
    });
  });
</script>

</body>
